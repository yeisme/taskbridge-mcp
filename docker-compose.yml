version: '3.8'

services:
  taskbridge:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-none}
        DATE: ${DATE:-unknown}
    image: taskbridge:${VERSION:-latest}
    container_name: taskbridge
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # 配置文件
      - ./configs:/app/configs:ro
      # 数据持久化
      - taskbridge-data:/app/data
      # 凭证文件（OAuth tokens等）
      - ./credentials:/app/credentials:ro
    environment:
      # 日志级别
      - TASKBRIDGE_LOG_LEVEL=${LOG_LEVEL:-info}
      # 配置文件路径
      - TASKBRIDGE_CONFIG=/app/configs/config.yaml
      # 时区
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - taskbridge-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.taskbridge.description=TaskBridge MCP Server"
      - "com.taskbridge.version=${VERSION:-latest}"

  # MongoDB（文档型数据库）
  mongodb:
    image: mongo:7
    container_name: taskbridge-mongodb
    restart: unless-stopped
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGODB_USER:-taskbridge}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGODB_PASSWORD:-taskbridge_secret}
    networks:
      - taskbridge-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    profiles:
      - mongodb
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  taskbridge-data:
    driver: local
  mongodb-data:
    driver: local

networks:
  taskbridge-network:
    driver: bridge
    labels:
      - "com.taskbridge.description=TaskBridge Network"
